name: Resize images
on:
  workflow_dispatch:
  push:
    paths:
      - 'images/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: |
          npm init -y
          npm install sharp@0.32.1 globby@13

      - name: Resize images
        run: |
          node -e "
          const sharp=require('sharp'),globby=require('globby'),fs=require('fs');
          (async()=>{
            const files=await globby('images/**/*.{png,jpg,jpeg}');
            if(files.length===0){ console.log('No images found'); return; }
            for(const f of files){
              try{
                await sharp(f)
                  .resize(300,100,{fit:'contain',background:{r:255,g:255,b:255,alpha:1}})
                  .toFile(f+'.tmp');
                fs.renameSync(f+'.tmp',f);
                console.log('resized',f);
              }catch(e){
                console.error('error',f,e.message);
              }
            }
          })().catch(e=>{console.error(e);process.exit(1);});
          "

      - name: Commit & push
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 'Resize images to 300x100'
