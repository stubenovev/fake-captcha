<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Catcap</title>
  <style>
    .captcha { max-width: 360px; margin: 40px auto; text-align:center; }
    .options { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:12px; }
    .options button { width:100px; height:80px; display:flex; align-items:center; justify-content:center; border:1px solid #ccc; background:#fff; cursor:pointer; padding:0; }
    .options img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
    .msg { margin-top:12px; font-weight:600; }
  </style>
</head>
<body>
  <div class="captcha">
    <h2 id="equation">Welcome Alien - Answer Your Personal Captcha</h2>
    <div class="options" id="options"></div>
    <div class="msg" id="message"></div>
  </div>

  <script>
    // seven option data using filenames image001..image007 in public/images/
    const options = [
      { id: 'image001', label: 'option1', src: '/images/image001.png' },
      { id: 'image002', label: 'option2', src: '/images/image002.png' },
      { id: 'image003', label: 'option3', src: '/images/image003.png' },
      { id: 'image004', label: 'option4', src: '/images/image004.png' },
      { id: 'image005', label: 'option5', src: '/images/image005.png' },
      { id: 'image006', label: 'option6', src: '/images/image006.png' },
      { id: 'image007', label: 'option7', src: '/images/image007.png' }
    ];

    const optionsContainer = document.getElementById('options');
    const message = document.getElementById('message');

    function createButton(opt) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.dataset.id = opt.id;
      btn.title = opt.label;
      const img = document.createElement('img');
      img.src = opt.src;
      img.alt = opt.label;
      btn.appendChild(img);
      btn.addEventListener('click', () => submitAnswer(opt.id));
      return btn;
    }

    options.forEach(o => optionsContainer.appendChild(createButton(o)));

    async function submitAnswer(selectedId) {
      message.textContent = 'Checking...';
      try {
        const resp = await fetch('/check-answer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ selectedImage: selectedId })
        });
        const data = await resp.json();
        // show "lol" for wrong answers
        if (data.success) {
          message.textContent = data.message;
        } else {
          message.textContent = 'lol';
        }
      } catch (e) {
        message.textContent = 'Error. Try again.';
      }
    }
  </script>
</body>
</html>
