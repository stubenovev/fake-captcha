<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Catcap</title>
  <style>
    .captcha { max-width: 760px; margin: 40px auto; text-align:center; }
    .images-row { display:flex; gap:16px; justify-content:center; margin-top:12px; }
    .option-btn { width:320px; height:320px; display:flex; align-items:center; justify-content:center; border:1px solid #ccc; background:#fff; cursor:pointer; padding:0; }
    .option-btn img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
    .msg { margin-top:12px; font-weight:600; min-height:1.2em; }
  </style>
</head>
<body>
  <div class="captcha">
    <h2>Welcome Alien - Solve this Captcha:</h2>
    <h2 style="margin-top:8px; font-family:serif;">∫<sub>−1</sub><sup>1</sup> x³ dx</h2>

    <div class="images-row" id="imagesRow"></div>
    <div class="msg" id="message"></div>
  </div>

  <script>
    // filenames image001..image007 in public/images/
    const allOptions = [
      { id: 'image001', src: '/images/image001.png' },
      { id: 'image002', src: '/images/image002.png' },
      { id: 'image003', src: '/images/image003.png' },
      { id: 'image004', src: '/images/image004.png' },
      { id: 'image005', src: '/images/image005.png' },
      { id: 'image006', src: '/images/image006.png' },
      { id: 'image007', src: '/images/image007.png' }
    ];

    const imagesRow = document.getElementById('imagesRow');
    const message = document.getElementById('message');

    // pool of remaining options to show; copy of allOptions
    let remaining = allOptions.slice();
    let busy = false;

    // get two random distinct items from remaining (or reshuffle remaining if fewer than 2 left)
    function pickTwo() {
      if (remaining.length < 2) {
        // reset remaining to any images not currently displayed (or refill from all)
        remaining = allOptions.slice();
      }
      // shuffle remaining and take first two
      for (let i = remaining.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
      }
      const pair = remaining.splice(0, 2);
      return pair;
    }

    function showPair() {
      imagesRow.innerHTML = '';
      const pair = pickTwo();
      pair.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.type = 'button';
        btn.dataset.id = opt.id;
        const img = document.createElement('img');
        img.src = opt.src;
        img.alt = opt.id;
        btn.appendChild(img);
        btn.addEventListener('click', () => handleClick(opt.id));
        imagesRow.appendChild(btn);
      });
      message.textContent = '';
      busy = false;
    }

    async function handleClick(selectedId) {
      if (busy) return;
      busy = true;
      message.textContent = 'lol try again';

      // optionally report selection to server
      try {
        await fetch('/check-answer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ selectedImage: selectedId })
        });
      } catch (e) {
        // ignore network errors for this flow
      }

      // after 3 seconds, show next pair
      setTimeout(() => {
        showPair();
      }, 3000);
    }

    // init
    showPair();
  </script>
</body>
</html>
