<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Catcap</title>
  <style>
    .captcha { max-width: 760px; margin: 40px auto; text-align:center; }
    .images-row { display:flex; gap:16px; justify-content:center; margin-top:12px; }
    .option-btn { width:320px; height:320px; display:flex; align-items:center; justify-content:center; border:1px solid #ccc; background:#fff; cursor:pointer; padding:0; }
    .option-btn img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
    .msg { margin-top:12px; font-weight:600; min-height:1.2em; }
  </style>
</head>
<body>
  <div class="captcha">
    <h2>Welcome Alien - Solve this Captcha:</h2>
    <h2 style="margin-top:8px; font-family:serif;" id="mathProblem"></h2>

    <div class="images-row" id="imagesRow"></div>
    <div class="msg" id="message"></div>

    <div id="gameOver" style="display:none; margin-top:32px;">
      <h2 style="font-size:2rem;">🎉 You did it!</h2>
      <p style="font-size:1.1rem; margin-top:8px;">Congratulations, you have proven you are <em>definitely</em> not an alien.</p>
      <p style="color:#888; font-size:0.9rem;">(We are still not sure about the math part.)</p>
      <button id="restartBtn" type="button" style="margin-top:20px; padding:10px 28px; font-size:1rem; cursor:pointer; border:1px solid #ccc; border-radius:4px; background:#f5f5f5;">Try Again</button>
    </div>
  </div>

  <script>
    // filenames image001..image007 in public/images/
    const allOptions = [
      { id: 'image001', src: '/images/image001.png' },
      { id: 'image002', src: '/images/image002.png' },
      { id: 'image003', src: '/images/image003.png' },
      { id: 'image004', src: '/images/image004.png' },
      { id: 'image005', src: '/images/image005.png' },
      { id: 'image006', src: '/images/image006.png' },
      { id: 'image007', src: '/images/image007.png' }
    ];

    // Math problems shown in the CAPTCHA header — one per page, chosen at random
    const mathProblems = [
      '∫\u208B\u2081\u00B9 x\u00B3 dx',
      '∫\u2080\u00B2 2x dx',
      '∫\u2081\u00B3 x\u00B2 dx',
      '∫\u2080\u00B9 e\u02E3 dx',
      'd/dx(x\u00B3 + 2x)',
      '∫\u208B\u2082\u00B2 |x| dx'
    ];

    const TOTAL_PAGES = 3;

    const imagesRow  = document.getElementById('imagesRow');
    const message    = document.getElementById('message');
    const mathEl     = document.getElementById('mathProblem');
    const gameOverEl = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');

    // pool of remaining options to show; copy of allOptions
    let remaining = allOptions.slice();
    let busy = false;
    let page = 0;           // increments after each click; game ends when it reaches TOTAL_PAGES
    let usedProblems = [];  // track which problems have been shown this game

    // Pick a math problem that hasn't been used yet this game
    function pickProblem() {
      const available = mathProblems.filter(p => !usedProblems.includes(p));
      const pool = available.length > 0 ? available : mathProblems;
      const chosen = pool[Math.floor(Math.random() * pool.length)];
      usedProblems.push(chosen);
      return chosen;
    }

    // get two random distinct items from remaining (or reshuffle remaining if fewer than 2 left)
    function pickTwo() {
      if (remaining.length < 2) {
        remaining = allOptions.slice();
      }
      // shuffle remaining and take first two
      for (let i = remaining.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
      }
      const pair = remaining.splice(0, 2);
      return pair;
    }

    function showPair() {
      imagesRow.innerHTML = '';
      const pair = pickTwo();
      pair.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.type = 'button';
        btn.dataset.id = opt.id;
        const img = document.createElement('img');
        img.src = opt.src;
        img.alt = opt.id;
        btn.appendChild(img);
        btn.addEventListener('click', () => handleClick(opt.id));
        imagesRow.appendChild(btn);
      });
      message.textContent = '';
      mathEl.innerHTML = pickProblem();
      busy = false;
    }

    function showGameOver() {
      imagesRow.innerHTML = '';
      message.textContent = '';
      mathEl.textContent = '';
      gameOverEl.style.display = 'block';
    }

    function restart() {
      page = 0;
      usedProblems = [];
      remaining = allOptions.slice();
      gameOverEl.style.display = 'none';
      showPair();
    }

    async function handleClick(selectedId) {
      if (busy) return;
      busy = true;
      page++;
      message.textContent = 'lol try again';

      // optionally report selection to server
      try {
        await fetch('/check-answer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ selectedImage: selectedId })
        });
      } catch (e) {
        // ignore network errors for this flow
      }

      if (page >= TOTAL_PAGES) {
        // Game over — show completion screen after the brief pause
        setTimeout(() => {
          showGameOver();
        }, 3000);
      } else {
        // Show next pair after 3 seconds
        setTimeout(() => {
          showPair();
        }, 3000);
      }
    }

    restartBtn.addEventListener('click', restart);

    // init
    showPair();
  </script>
</body>
</html>
