<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Catcap</title>
  <style>
    .captcha { max-width: 360px; margin: 40px auto; text-align:center; }
    .options { display:flex; gap:8px; justify-content:center; margin-top:12px; }
    .option-btn { width:300px; height:300px; display:flex; align-items:center; justify-content:center; border:1px solid #ccc; background:#fff; cursor:pointer; padding:0; }
    .option-btn img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
    .msg { margin-top:12px; font-weight:600; min-height:1.2em; }
  </style>
</head>
<body>
  <div class="captcha">
    <h2>Welcome Alien</h2>
    <h2 style="margin-top:8px; font-family:serif;">∫<sub>−1</sub><sup>1</sup> x³ dx</h2>

    <div class="options" id="options"></div>
    <div class="msg" id="message"></div>
  </div>

  <script>
    // filenames image001..image007 in public/images/
    const options = [
      { id: 'image001', src: '/images/image001.png' },
      { id: 'image002', src: '/images/image002.png' },
      { id: 'image003', src: '/images/image003.png' },
      { id: 'image004', src: '/images/image004.png' },
      { id: 'image005', src: '/images/image005.png' },
      { id: 'image006', src: '/images/image006.png' },
      { id: 'image007', src: '/images/image007.png' }
    ];

    const optionsContainer = document.getElementById('options');
    const message = document.getElementById('message');

    let index = 0;
    let busy = false;

    function showCurrent() {
      optionsContainer.innerHTML = '';
      if (index >= options.length) {
        message.textContent = 'All done.';
        return;
      }
      const opt = options[index];
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.type = 'button';
      const img = document.createElement('img');
      img.src = opt.src;
      img.alt = opt.id;
      btn.appendChild(img);
      btn.addEventListener('click', () => handleClick(opt.id));
      optionsContainer.appendChild(btn);
      message.textContent = '';
      busy = false;
    }

    async function handleClick(selectedId) {
      if (busy) return;
      busy = true;
      // show local message immediately
      message.textContent = 'lol try again';

      // optionally send selection to server for logging/validation
      try {
        await fetch('/check-answer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ selectedImage: selectedId })
        });
      } catch (e) {
        // ignore network errors for this flow
      }

      // move to next image after 3 seconds
      setTimeout(() => {
        index++;
        showCurrent();
      }, 3000); // 3000ms = 3 seconds
    }

    // init
    showCurrent();
  </script>
</body>
</html>
